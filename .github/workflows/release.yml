name: Release Site

on:
  workflow_run:
    workflows: ["Build Site"]
    types:
      - completed
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    environment: 
      name: legion
      url: https://pros.cs.purdue.edu
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          # name: pros-docs.tar.gz
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: pros-docs.tar.gz

      - name: Send Artifact to Server
        run: |
          echo "${{ secrets.SSH_KEY }}" > key
          chmod 400 key
          scp -o StrictHostKeyChecking=no -i key pros-docs.tar.gz ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:~/pros-website
