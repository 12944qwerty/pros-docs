        #   source: pros-docs.tar.gz
        #   host: ${{ vars.SSH_HOST }}
        #   username: ${{ vars.SSH_USER }}
        #   key: ${{ secrets.SSH_KEY }}
        #   remote_dir: ~/pros-website
